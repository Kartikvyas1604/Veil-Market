<svg width="100%" height="100%" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Outer Frame representing the boundary/envelope -->
  <rect x="4" y="4" width="92" height="92" rx="12" stroke="#8A8780" stroke-width="4" stroke-opacity="0.4"/>
  
  <!-- Left arm of V (Solid = public outcome) -->
  <path d="M28 26 L50 72" stroke="#F2F1EF" stroke-width="8" stroke-linecap="square"/>
  
  <!-- Right arm of V (Dashed = encrypted position) -->
  <path d="M72 26 L50 72" stroke="#F2F1EF" stroke-width="8" stroke-linecap="square" stroke-dasharray="10 8"/>
  
  <!-- Central Redaction Block (Confidentiality) -->
  <rect x="14" y="44" width="72" height="12" fill="#F2F1EF"/>
  
  <!-- Cryptographic Seal in the center -->
  <circle cx="50" cy="50" r="10" fill="#0E0D0B" stroke="#F2F1EF" stroke-width="4"/>
</svg>
